<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ config.title }} - Như Lùn Cinema</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="page-bg" style="background-image: url('{{ config.poster }}');"></div>

<div class="top-logo">
    <a href="/" class="logo">
        <img src="/static/posters/bg.jpg" alt="Logo" class="logo-img">
        <span class="logo-text">
            <span class="logo-name">NHƯ LÙN</span><span class="logo-suffix">CINEMA</span>
        </span>
    </a>
</div>

<div class="choice-content">
    <h1 class="choice-movie-title">{{ config.title }}</h1>
    <p class="choice-desc">{{ config.desc }}</p>

    <div class="choice-cards">
        <a href="/episodes/{{ slug }}/series" class="choice-card">
            <span class="choice-icon">📺</span>
            <h2>Series</h2>
            <p>TV Episodes</p>
        </a>
        <a href="/episodes/{{ slug }}/movies" class="choice-card">
            <span class="choice-icon">🎬</span>
            <h2>Movies</h2>
            <p>Feature Films</p>
        </a>
    </div>

    <a href="/" class="back-link">← Back to Collections</a>
</div>

</body>
</html>
